{% extends "appbuilder/base.html" %}

{% block content %}

<div class="login-container">
    <h1>CaffeinaMetrics</h1>

    <form method="post">
        {{ form.hidden_tag() }}

        <div>
            {{ form.username.label }}
            {{ form.username() }}
        </div>

        <div>
            {{ form.password.label }}
            {{ form.password() }}
        </div>

        <button type="submit">Ingresar</button>
    </form>
</div>

{% endblock %}
